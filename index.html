<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrinKar Business Suite V5 - Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #630d16; --bg: #0a0a0a; --card-bg: #151515; --text: #f8f9fa; --text-muted: #a0a0a0; --accent: #27ae60; --warning: #e67e22; --info: #2980b9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Lato', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header { background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .nav-bar { background: var(--card-bg); display: flex; justify-content: space-between; padding: 10px 15px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; gap: 5px; }
        .nav-item { color: var(--text-muted); text-decoration: none; font-size: 9px; text-align: center; padding: 5px 10px; flex: 1; }
        .nav-item.active { color: var(--text); font-weight: bold; }
        .nav-item.active .nav-icon { background: var(--primary); color: white; }
        .nav-icon { font-size: 18px; display: block; margin-bottom: 5px; background: #222; padding: 8px; border-radius: 10px; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        input, select { width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 10px; color: white; font-size: 15px; outline: none; margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top:10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--accent); color: white; }
        .btn-danger { background: #c0392b; color: white; font-size: 10px; width: auto; padding: 5px 10px; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .price-tag { background: #1a1a1a; padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary); }
        .price-tag span { display: block; font-size: 9px; color: var(--text-muted); }
        table { width: 100%; border-collapse: collapse; background: #111; font-size: 12px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--primary); color: var(--primary); }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .hidden { display: none; }
        #ticket-wrap { background: white; color: black; padding: 20px; width: 320px; margin: auto; font-family: monospace; }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Cargando DrinKar...</p></div>

<div class="header">
    <h1>Drin<span style="color:var(--primary)">Kar</span></h1>
    <p style="font-size: 10px; color: var(--text-muted);">SISTEMA LOCAL INDEPENDIENTE</p>
</div>

<div class="nav-bar">
    <a href="#" class="nav-item active" onclick="showView('calc', this)"><span class="nav-icon">⚖️</span>CALC</a>
    <a href="#" class="nav-item" onclick="showView('inv', this)"><span class="nav-icon">📦</span>INV</a>
    <a href="#" class="nav-item" onclick="showView('pos', this)"><span class="nav-icon">🛒</span>VENTA</a>
    <a href="#" class="nav-item" onclick="showView('rep', this)"><span class="nav-icon">📈</span>REPORTE</a>
</div>

<div class="container">
    <div id="view-calc" class="view">
        <div class="card">
            <h3>Calculadora de Precios</h3>
            <label>Costo Neto Producto</label>
            <input type="number" id="calc-in" oninput="runCalc()">
            <div id="calc-out" class="price-grid"></div>
        </div>
    </div>

    <div id="view-inv" class="view hidden">
        <div class="card">
            <h3>Nuevo Producto</h3>
            <input type="text" id="inv-nom" placeholder="Nombre del producto">
            <input type="number" id="inv-cost" placeholder="Costo">
            <input type="number" id="inv-qty" placeholder="Stock inicial">
            <button class="btn btn-primary" onclick="addInv()">Guardar Producto</button>
        </div>
        <div id="inv-render"></div>
    </div>

    <div id="view-pos" class="view hidden">
        <div class="card">
            <h3>Punto de Venta</h3>
            <label>Producto</label>
            <select id="pos-prod"></select>
            <label>Cantidad</label>
            <input type="number" id="pos-qty" value="1">
            <button class="btn btn-primary" onclick="addToCart()">+ Agregar</button>
        </div>
        <div class="card" id="cart-card">
            <h3>Carrito</h3>
            <div id="cart-list"></div>
            <h2 id="cart-total">$0.00</h2>
            <button class="btn btn-success" onclick="sell()">Finalizar Venta</button>
        </div>
    </div>

    <div id="view-rep" class="view hidden">
        <div class="card">
            <h3>Resumen</h3>
            <h1 id="rep-v">$0</h1>
            <label>Ventas Totales</label>
        </div>
        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th>Fecha</th><th>Concepto</th><th>Total</th></tr></thead>
                <tbody id="rep-list"></tbody>
            </table>
            <button class="btn" style="background:#444; color:white; font-size:10px;" onclick="clearData()">⚠️ Borrar Todo</button>
        </div>
    </div>
</div>

<script>
    // SISTEMA DE ALMACENAMIENTO LOCAL (Sin Google)
    let db = JSON.parse(localStorage.getItem('drinkar_db')) || { inv: [], mov: [] };
    let cart = [];

    function save() {
        localStorage.setItem('drinkar_db', JSON.stringify(db));
    }

    function showView(view, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('view-' + view).classList.remove('hidden');
        el.classList.add('active');
        if(view === 'inv') renderInv();
        if(view === 'pos') renderPos();
        if(view === 'rep') renderRep();
    }

    function runCalc() {
        let c = parseFloat(document.getElementById('calc-in').value) || 0;
        let p = c * 1.15;
        document.getElementById('calc-out').innerHTML = `
            <div class="price-tag"><span>Público (+15%)</span><b>$${p.toFixed(2)}</b></div>
            <div class="price-tag"><span>Mayoreo (-5%)</span><b>$${(p*0.95).toFixed(2)}</b></div>
        `;
    }

    function addInv() {
        let n = document.getElementById('inv-nom').value;
        let c = parseFloat(document.getElementById('inv-cost').value);
        let q = parseInt(document.getElementById('inv-qty').value);
        if(!n || isNaN(c)) return alert("Completa los datos");
        db.inv.push({ id: Date.now(), nom: n, cost: c, stock: q });
        save(); renderInv();
        document.getElementById('inv-nom').value = "";
    }

    function renderInv() {
        document.getElementById('inv-render').innerHTML = db.inv.map((p, i) => `
            <div class="card">
                <b>${p.nom}</b> - Stock: ${p.stock}
                <br><small>Costo: $${p.cost}</small>
                <button class="btn-danger" onclick="db.inv.splice(${i},1);save();renderInv()">Borrar</button>
            </div>
        `).join('');
    }

    function renderPos() {
        document.getElementById('pos-prod').innerHTML = db.inv.map(p => `<option value="${p.id}">${p.nom} (${p.stock})</option>`).join('');
    }

    function addToCart() {
        let id = document.getElementById('pos-prod').value;
        let q = parseInt(document.getElementById('pos-qty').value);
        let p = db.inv.find(x => x.id == id);
        if(!p || p.stock < q) return alert("No hay stock");
        let price = p.cost * 1.15;
        cart.push({ nom: p.nom, qty: q, total: price * q, id: p.id });
        renderCart();
    }

    function renderCart() {
        let t = 0;
        document.getElementById('cart-list').innerHTML = cart.map(i => {
            t += i.total;
            return `<p>${i.qty} x ${i.nom} = $${i.total.toFixed(2)}</p>`;
        }).join('');
        document.getElementById('cart-total').innerText = `$${t.toFixed(2)}`;
    }

    function sell() {
        if(cart.length === 0) return;
        let total = 0;
        cart.forEach(i => {
            total += i.total;
            let prod = db.inv.find(x => x.id == i.id);
            if(prod) prod.stock -= i.qty;
        });
        db.mov.push({ fecha: new Date().toLocaleDateString(), total: total, desc: "Venta" });
        cart = []; save(); renderCart(); alert("Venta Exitosa");
    }

    function renderRep() {
        let v = 0;
        document.getElementById('rep-list').innerHTML = db.mov.map(m => {
            v += m.total;
            return `<tr><td>${m.fecha}</td><td>${m.desc}</td><td>$${m.total.toFixed(2)}</td></tr>`;
        }).join('');
        document.getElementById('rep-v').innerText = `$${v.toFixed(2)}`;
    }

    function clearData() {
        if(confirm("¿Borrar todos los datos?")) { localStorage.clear(); location.reload(); }
    }

    window.onload = () => { document.getElementById('loading').style.display = 'none'; };
</script>
</body>
</html>
